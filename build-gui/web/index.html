<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Fluxer Build GUI</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #1e1f24;
    --panel: #26272e;
    --border: #383a44;
    --text: #e6e6ea;
    --muted: #9497a3;
    --accent: #5b8cff;
    --ok: #4caf7d;
    --err: #e5646b;
    font-family: "Segoe UI", system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  header h1 {
    font-size: 15px;
    margin: 0;
    font-weight: 600;
  }
  #repoPath {
    font-size: 12px;
    color: var(--muted);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--panel);
  }
  .row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  button {
    background: #34363f;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 14px;
    font-size: 13px;
    cursor: pointer;
  }
  button:hover:not(:disabled) { border-color: var(--accent); }
  button:disabled { opacity: 0.45; cursor: not-allowed; }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.zip { background: #3a3d47; }
  button.publish { background: #2c6b46; border-color: #2c6b46; color: #fff; }
  button.publish:hover:not(:disabled) { border-color: var(--ok); }
  .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    background: var(--muted);
  }
  .status-dot.ok { background: var(--ok); }
  .status-dot.warn { background: #e0a83e; }
  #wslNote {
    font-size: 12px;
    color: var(--muted);
    margin-top: 8px;
  }
  #log {
    flex: 1;
    overflow-y: auto;
    padding: 10px 18px;
    font-family: "Cascadia Code", Consolas, monospace;
    font-size: 12.5px;
    white-space: pre-wrap;
    line-height: 1.45;
  }
  .line-stdout { color: var(--text); }
  .line-stderr { color: #f0b45a; }
  .line-info { color: var(--accent); }
  .line-error { color: var(--err); }
  footer {
    padding: 8px 18px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>
  <header>
    <h1>Fluxer Build GUI</h1>
    <span id="repoPath">detecting repo root...</span>
    <button id="pickRepo">Change repo...</button>
  </header>

  <main>
    <div class="panel">
      <div class="row">
        <button id="buildWindows" class="primary">Build Windows</button>
        <button id="zipWindows" class="zip">Zip Windows release</button>
        <span style="width: 16px"></span>
        <button id="buildLinux" class="primary">Build Linux (WSL2)</button>
        <button id="zipLinux" class="zip">Zip Linux release</button>
        <span style="width: 16px"></span>
        <button id="publishRelease" class="publish">Publish release (GitHub)</button>
      </div>
      <div id="wslNote"><span id="wslDot" class="status-dot"></span><span id="wslText">Checking WSL2...</span></div>
    </div>
    <div id="log"></div>
  </main>

  <footer>
    <span id="taskStatus">Idle</span>
    <span id="hint">Output is zipped to &lt;repo&gt;/dist-archives/</span>
  </footer>

  <script type="module" src="./main.js"></script>
</body>
</html>
