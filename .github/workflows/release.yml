# Release pipeline for Fluxer Desktop (Tauri).
#
# Triggered by pushing a `v*` tag (e.g. `v0.3.2`). Builds the Windows MSI and
# the Linux AppImage IN PARALLEL on two separate GitHub-hosted runners, signs
# both with the updater key, and publishes them — plus the updater manifest
# (latest.json) — to a GitHub Release for that tag.
#
# Why this exists: the local hand-build (Windows natively + Linux in WSL on the
# same machine) ran the two platforms serially with shared CPU/disk contention,
# taking 5-10 minutes. This workflow moves both off your machine entirely and
# runs them concurrently, with persistent caching so warm builds are ~3-6 min
# wall-clock (the slower of the two jobs). See CHANGES.md (Part B) for the full
# rationale, the secrets you must set up, and expected timings.
#
# First-run (cold cache) per platform: ~15-25 min. Subsequent runs: ~3-6 min.

name: release

on:
  push:
    tags:
      - 'v*'
  # Allow manual triggering from the Actions tab for testing/rebuilds without a
  # tag. The release-publish step is gated on `startsWith(github.ref, 'refs/tags/')`
  # so a manual run builds + uploads artifacts but does NOT publish a release.
  workflow_dispatch:

# Only one release build at a time per tag — a re-push of the same tag cancels
# the in-flight run. Prevents duplicate published releases.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # OVERRIDE the committed .cargo/config.toml, which sets
  # `rustc-wrapper = "sccache"` for local dev. sccache is NOT installed in CI
  # (removed — it failed the build at cache-server startup; see the Rust-caching
  # note in the build job). Without this override every cargo command in CI
  # would try to exec a missing `sccache` and die. An empty
  # CARGO_BUILD_RUSTC_WRAPPER takes precedence over the config file's value and
  # makes cargo invoke rustc directly. Swatinem/rust-cache handles caching.
  CARGO_BUILD_RUSTC_WRAPPER: ""

jobs:
  build:
    name: build (${{ matrix.os }} / ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false   # if Windows fails, still produce the Linux build (and vice versa)
      matrix:
        include:
          - os: windows
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_glob: src-tauri/target/release/bundle/msi/*.msi*
          - os: linux
            runner: ubuntu-22.04   # NOT ubuntu-latest: tauri's webkit2gtk is pinned and 24.04's glibc breaks AppImage portability
            target: x86_64-unknown-linux-gnu
            artifact_glob: src-tauri/target/release/bundle/appimage/*.AppImage*

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # The reference frontend (reference/fluxer/fluxer_app) is committed
        # directly into this repo — it's our editable shipped-UI source, not a
        # submodule — so a plain checkout has everything the frontend build needs.

      # ---------------------------------------------------------------------
      # Frontend: skip-or-rebuild. The maybe-rebuild-frontend.mjs script hashes
      # the reference client inputs and skips the ~34s rspack build when nothing
      # changed (most Rust-only releases). web/dist is committed-as-built in
      # some workflows, but here we always run the checker — it self-skips.
      # ---------------------------------------------------------------------
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.3   # matches reference/fluxer/fluxer_app/package.json packageManager

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22   # local dev uses 22.x (see maybe-rebuild-frontend.mjs verified on 22.14.0)
          cache: pnpm
          cache-dependency-path: reference/fluxer/fluxer_app/pnpm-lock.yaml

      - name: Install frontend deps
        working-directory: reference/fluxer/fluxer_app
        run: pnpm install --frozen-lockfile

      - name: Build frontend (skipped if unchanged)
        run: node scripts/maybe-rebuild-frontend.mjs

      # ---------------------------------------------------------------------
      # Rust toolchain + caching. Order matters: toolchain before any cargo
      # invocation; rust-cache before the build.
      # ---------------------------------------------------------------------
      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # NOTE: sccache is DELIBERATELY NOT USED in CI. It was removed after it
      # repeatedly failed the whole build at SERVER STARTUP ("Server startup
      # failed: cache storage failed to read ... Our services aren't available
      # right now", GHA artifact-cache returning HTTP 400) — a failure that
      # SCCACHE_IGNORE_SERVER_IO_ERROR does NOT cover (that flag only tolerates
      # I/O errors DURING compilation, not startup). With RUSTC_WRAPPER=sccache
      # set globally, that startup failure killed EVERY cargo invocation incl.
      # `cargo install tauri-cli`. `Swatinem/rust-cache` (below) already caches
      # ~/.cargo + target/ across runs, so the compile-caching need is covered
      # without sccache's fragile always-on cache-service dependency. Locally,
      # sccache is still used via .cargo/config.toml — that's unaffected.

      - name: Cache tauri-cli install
        # tauri-cli is ~50 crates to compile; cache the installed binary so we
        # only pay that cost when the pinned version changes. Keyed on the OS +
        # the version string below.
        id: cache-tauri-cli
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-tauri
            ~/.cargo/bin/cargo-tauri.exe
            ~/.cargo/bin/tauri
            ~/.cargo/bin/tauri.exe
          key: tauri-cli-2.11-${{ runner.os }}-v1

      - name: Install tauri-cli (pins a version matching the workspace's tauri crate)
        # tauri-cli is NOT a workspace dependency (it's a global cargo-install
        # locally), so the workflow must install it explicitly. Pinned to the
        # 2.11 line to match tauri crate 2.11.5 in Cargo.lock. Skipped when the
        # cache hit above already placed the binary in ~/.cargo/bin.
        if: steps.cache-tauri-cli.outputs.cache-hit != 'true'
        shell: bash
        run: cargo install tauri-cli --version "^2.11" --locked

      - name: Ensure cargo-tauri is on PATH
        shell: bash
        run: |
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          cargo tauri --version

      - name: Cache Cargo target dir
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: .
          # Key on the lockfile + target + runner OS. A Cargo.lock change misses
          # the cache (correct — deps changed); everything else hits.
          save-if: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}

      # ---------------------------------------------------------------------
      # Native build dependencies per platform.
      # ---------------------------------------------------------------------
      - name: Install Linux build deps
        if: matrix.os == 'linux'
        shell: bash
        run: |
          # Tauri Linux prerequisites (webkit2gtk-4.1, appindicator, etc.) plus
          # our extra needs: clang + mold (the .cargo/config.toml fast linker
          # setup), nasm (mozjpeg-sys via the camera feature), cmake
          # (webrtc-sys's C++ build), librsvg2 (Tauri icon handling on Linux).
          #
          # We install with plain apt-get, NOT awalsh128/cache-apt-pkgs-action:
          # that action PINS exact package versions and resolves them against a
          # cached index, which 404s the moment a mirror rotates a point-release
          # (`libnghttp2-dev_1.43.0-1ubuntu0.3 404 Not Found`). When its install
          # aborts it does so SILENTLY — mold never lands, and the build only
          # fails 10 min later at the first link with `clang: error: invalid
          # linker name in argument '-fuse-ld=mold'`. A fresh `apt-get update`
          # every run is a few seconds and always resolves current versions.
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev libayatana-appindicator3-dev librsvg2-dev \
            patchelf clang mold nasm cmake build-essential curl wget file
          # Fail loudly HERE if mold didn't land, rather than 10 min into the
          # build at link time with a cryptic clang error.
          mold --version

      - name: Install Windows build deps (LLVM for lld-link, NASM, cmake)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          # lld-link.exe is the multi-threaded linker .cargo/config.toml points
          # at (replaces the single-threaded link.exe). It ships with LLVM.
          choco install -y --no-progress llvm nasm cmake
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      # ---------------------------------------------------------------------
      # Cache the ~110 MB libwebrtc download that vendor/webrtc-sys/build.rs
      # fetches via webrtc_sys_build::download_webrtc(). Keyed on the git rev
      # (in Cargo.toml [patch] section) so it invalidates when we move revs.
      # ---------------------------------------------------------------------
      - name: Cache libwebrtc download
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/webrtc
            ~/AppData/Local/webrtc
          key: libwebrtc-95187dff9324e474ebb27a6ee7d2213f9a1caad3

      # ---------------------------------------------------------------------
      # The build. Injects the updater signing key from secrets so the .sig
      # files are produced for the in-app updater.
      #
      # Notes:
      #   - CUDA/NVENC arm is OFF in CI (CUDA_HOME unset) — the build.rs skips
      #     it. CI produces the standard non-NVENC build, same as a release
      #     without an NVIDIA encoder box. NVENC users self-build locally.
      #   - We don't pass --target because the runner's default host target IS
      #     the target we want (no cross-compile), which lets rust-cache and
      #     sccache key correctly.
      #   - tauri.conf.json already declares both bundle targets, but `cargo
      #     tauri build` only builds the ones valid for the host platform, so
      #     Windows produces just the MSI and Linux produces just the AppImage.
      # ---------------------------------------------------------------------
      - name: Build Tauri app (release + signed)
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: cargo tauri build

      # ---------------------------------------------------------------------
      # Upload everything in the bundle dir matching the platform's glob.
      # Includes the installer + its .sig sibling.
      # ---------------------------------------------------------------------
      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.os }}
          path: ${{ matrix.artifact_glob }}
          if-no-files-found: error
          retention-days: 14

  # -------------------------------------------------------------------------
  # Release job: waits for both platform builds, downloads their artifacts,
  # and publishes everything to the GitHub Release for the tag. Also uploads
  # the generated latest.json (updater manifest) from whichever platform
  # produced it (Tauri writes it into the bundle dir of each platform; they're
  # identical, so we take either).
  # -------------------------------------------------------------------------
  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    # Only publish on real tag pushes — manual workflow_dispatch runs build +
    # upload artifacts but stop short of publishing.
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write   # required by softprops/action-gh-release to create the release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true   # flatten bundle-windows/* and bundle-linux/* into one dir

      - name: Collect latest.json (updater manifest)
        id: manifest
        shell: bash
        run: |
          # Tauri emits latest.json into the bundle dir. Find it and stage it at
          # the release root so the updater endpoint
          # (/releases/latest/download/latest.json) resolves.
          set -euo pipefail
          manifest=$(find release-artifacts -name 'latest.json' -print -quit || true)
          if [ -n "$manifest" ]; then
            cp "$manifest" release-artifacts/latest.json
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Staged latest.json:"
            cat release-artifacts/latest.json
          else
            echo "WARNING: no latest.json found in bundle output; updater manifest will be missing."
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: List release artifacts
        shell: bash
        run: |
          echo "=== files being published ==="
          ls -la release-artifacts/

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # Tag name without the refs/tags/ prefix.
          name: ${{ github.ref_name }}
          generate_release_notes: true   # auto-generate from commits since last tag
          fail_on_unmatched_files: true
          files: |
            release-artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
